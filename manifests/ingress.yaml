apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: configure-ingress-deletetask
  labels:
    app.kubernetes.io/name: myingress
spec:
  ingressClassName: nginx
  rules:
  - host: delete-task.kulphi.shop
    http:
      paths:
      - pathType: Prefix
        path: "/"
        backend:
          service:
            name: delete-task-service #service name mean Loadbalancer service ka naam, yha cluster ip type LB ko add kar rahe
            port: 
              number: 80 #service ka portnumber
